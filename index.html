<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Калькулятор</h1>
        <div class="tabs">
            <button class="tab active" data-mode="smelt">Плавка</button>
            <button class="tab" data-mode="alloy">Сплавы</button>
            <button class="tab" data-mode="test">Тест</button>
        </div>

        <div class="mode active" id="modeSmelt">
            <div class="row">
                <div class="field">
                    <label>Пыль (шт)</label>
                    <input type="number" id="m1Dust" value="" min="0" placeholder="0">
                </div>
                <div class="field">
                    <label>мб / 1 пыль</label>
                    <input type="number" id="m1DustRate" value="" min="0" step="any" placeholder="0">
                </div>
            </div>
            <div class="row">
                <div class="field">
                    <label>мб / 1 слиток</label>
                    <input type="number" id="m1IngotRate" value="" min="0" step="any" placeholder="0">
                </div>
                <div class="field">
                    <label>Макс мб / сосуд</label>
                    <input type="number" id="m1VesselCap" value="3024" readonly tabindex="-1">
                </div>
            </div>
            <div class="actions">
                <button class="btn-calc" onclick="calcSmelt()">Рассчитать</button>
                <button class="btn-reset" onclick="resetSmelt()">Сброс</button>
            </div>
            <div class="results hidden" id="m1Results">
                <div><span class="label">Всего мб</span><span class="value" id="m1TotalMb">0</span></div>
                <div><span class="label">Целых слитков</span><span class="value" id="m1Ingots">0</span></div>
                <div><span class="label">Остаток мб</span><span class="value" id="m1Remainder">0</span></div>
                <div><span class="label">Нужно сосудов</span><span class="value" id="m1Vessels">0</span></div>
                <div><span class="label">Ровно слитков (без ост.)</span><span class="value good" id="m1Exact">—</span></div>
                <div><span class="label">Пыли для ровного кол-ва</span><span class="value" id="m1ExactDust">—</span></div>
            </div>
            <div class="footer">Enter для пересчёта</div>
        </div>

        <div class="mode" id="modeAlloy">
            <div id="m2InputsList" class="inputs-container"></div>
            <button class="btn-add" id="m2AddBtn">+ Добавить металл</button>
            <div class="results" id="m2Results">
                <div><span class="label">Сумма</span><span class="value" id="m2TotalMb">0</span> мБ</div>
                <div><span class="label">Слитки</span><span class="value" id="m2TotalIngots">0</span> шт.</div>
            </div>
        </div>

        <div class="mode" id="modeTest">
            <div class="recipe-bar">
                <input class="recipe-name" id="mtRecipeName" value="" placeholder="Название рецепта">
                <button class="btn-sm" onclick="mtSave()">Save</button>
                <button class="btn-sm btn-danger" onclick="mtDelete()">Del</button>
                <button class="btn-sm" onclick="mtExport()">JSON</button>
                <button class="btn-sm" onclick="mtImport()">Import</button>
            </div>
            <div class="recipe-gallery" id="mtGallery"></div>
            <div class="recipe-preview" id="mtPreview">
                <span class="preview-empty">Нет загруженного рецепта</span>
            </div>
            <div class="row">
                <div class="field">
                    <label>Макс мб / сосуд</label>
                    <input type="number" id="mtVesselCap" value="3024" readonly tabindex="-1">
                </div>
            </div>
            <div class="mt-header">
                <span style="flex:2">Материал</span>
                <span style="flex:1">% от</span>
                <span style="flex:1">% до</span>
                <span style="flex:1">мб/ед</span>
                <span style="flex:1">Есть (шт)</span>
                <span style="flex:1">Нужно (шт)</span>
                <span style="width:32px"></span>
            </div>
            <div id="mtList"></div>
            <button class="btn-add" id="mtAddBtn">+ Добавить</button>
            <div class="actions" style="margin-top:12px">
                <button class="btn-calc" onclick="mtCalc()">Рассчитать</button>
                <button class="btn-reset" onclick="mtReset()">Сброс</button>
            </div>
            <div class="results" id="mtResults">
                <div><span class="label">Сумма %</span><span class="value" id="mtTotalPct">0%</span></div>
                <div><span class="label">Итого сплава (мб)</span><span class="value" id="mtTotalMb">0</span></div>
                <div><span class="label">Слитков</span><span class="value" id="mtTotalIngots">0</span></div>
                <div><span class="label">Нужно сосудов</span><span class="value" id="mtVessels">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
